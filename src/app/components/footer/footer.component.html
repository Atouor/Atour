<footer class="footer">
  <div class="container footer-inner">
    <div class="footer-left">
      <span class="footer-logo">Atour<span class="dot">.</span></span>
      <p>{{ i18n.t.footer.tagline }}</p>
    </div>
    <div class="footer-social">
      <a *ngFor="let s of socials" [href]="s.url" target="_blank" rel="noopener noreferrer" [title]="s.label">
        <svg *ngIf="s.svg" class="social-svg" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
        </svg>
        <img *ngIf="s.icon" [src]="s.icon" [alt]="s.label">
      </a>
    </div>
    <button class="top-btn" (click)="goTop()" aria-label="Top">↑</button>
  </div>
  <div class="footer-bar">
    <div class="container">
      <p>&copy; {{ year }} {{ i18n.t.footer.copyright }}</p>
    </div>
  </div>
</footer>
